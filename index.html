<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арина и Коля | Платформа желаний</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }

        .platform {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 245, 250, 0.95);
            border-radius: 50px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.3);
            border: 2px solid #f8bbd0;
            margin: 20px 0;
        }

        .title {
            text-align: center;
            font-size: 48px;
            color: #c2185b;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.2);
        }

        .photo-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .photo-frame {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            overflow: hidden;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.4);
            background: #f8bbd0;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-hint {
            text-align: center;
            font-size: 12px;
            color: #c2185b;
            margin-top: 8px;
            opacity: 0.7;
        }

        .subtitle {
            text-align: center;
            font-size: 20px;
            color: #880e4f;
            margin: 15px 0 25px;
            font-style: italic;
            background: rgba(248, 187, 208, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
        }

        .sync-status {
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 15px;
            background: #e8f5e9;
            color: #2e7d32;
            transition: all 0.3s;
        }

        .sync-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .wish-section {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 25px;
            margin-top: 10px;
        }

        .wishes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .wishes-title {
            color: #c2185b;
            font-size: 22px;
            font-weight: bold;
        }

        .toggle-form-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .toggle-form-btn:hover {
            background: #c2185b;
            transform: scale(1.05);
        }

        .toggle-form-btn.collapsed {
            background: #f8bbd0;
            color: #c2185b;
        }

        .add-wish-form {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px dashed #f8bbd0;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .add-wish-form.collapsed {
            max-height: 0;
            padding: 0 20px;
            margin-bottom: 0;
            opacity: 0;
            border: none;
        }

        .add-wish-form:not(.collapsed) {
            max-height: 1000px;
            opacity: 1;
        }

        .form-title {
            color: #c2185b;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            color: #880e4f;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #f8bbd0;
            border-radius: 15px;
            font-size: 14px;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #e91e63;
        }

        .image-upload {
            margin: 10px 0;
        }

        .image-upload label {
            background: #f8bbd0;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            color: #880e4f;
            font-size: 14px;
            display: inline-block;
            font-weight: bold;
        }

        .image-upload input {
            display: none;
        }

        .preview-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(233, 30, 99, 0.2);
            margin-top: 10px;
            display: none;
        }

        .preview-image.show {
            display: block;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-btn, .save-btn, .cancel-btn {
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            flex: 1;
            transition: all 0.2s;
        }

        .add-btn {
            background: #e91e63;
            color: white;
        }

        .add-btn:hover {
            background: #c2185b;
        }

        .save-btn {
            background: #4caf50;
            color: white;
        }

        .save-btn:hover {
            background: #45a049;
        }

        .cancel-btn {
            background: #f8bbd0;
            color: #c2185b;
        }

        .cancel-btn:hover {
            background: #f48fb1;
        }

        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .wish-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.15);
            transition: transform 0.2s;
            position: relative;
        }

        .wish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(233, 30, 99, 0.25);
        }

        .wish-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #fce4ec;
            cursor: pointer;
        }

        .wish-card-content {
            padding: 15px;
        }

        .wish-card-title {
            font-size: 16px;
            font-weight: bold;
            color: #c2185b;
            margin-bottom: 5px;
        }

        .wish-card-description {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .wish-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }

        .wish-card-date {
            font-size: 11px;
            color: #999;
        }

        .wish-card-actions {
            display: flex;
            gap: 5px;
        }

        .edit-card-btn, .delete-card-btn {
            border: none;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .edit-card-btn {
            background: #e8f5e9;
            color: #4caf50;
        }

        .edit-card-btn:hover {
            background: #4caf50;
            color: white;
        }

        .delete-card-btn {
            background: #ffebee;
            color: #e91e63;
        }

        .delete-card-btn:hover {
            background: #e91e63;
            color: white;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 18px;
            color: #c2185b;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            border: 3px solid #f8bbd0;
            border-top: 3px solid #e91e63;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-message {
            text-align: center;
            color: #c2185b;
            padding: 30px;
            font-style: italic;
            grid-column: 1 / -1;
        }

        @media (max-width: 500px) {
            .platform {
                padding: 20px 15px;
                border-radius: 30px;
            }
            .title {
                font-size: 36px;
            }
            .photo-frame {
                width: 200px;
                height: 200px;
            }
            .wishes-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        Загрузка желаний...
    </div>

    <div class="platform">
        <div class="title">Арина и Коля</div>

        <div class="photo-container">
            <div class="photo-frame">
                <img id="mainPhoto" src="Арина и Коля.jpg" alt="Арина и Коля" title="Нажмите, чтобы изменить фото">
            </div>
        </div>
        <div class="photo-hint">📷 Нажмите на фото, чтобы изменить</div>

        <div class="subtitle">✨ Платформа совместных желаний ✨</div>

        <div class="sync-status" id="syncStatus">🟢 Все данные синхронизированы</div>

        <div class="wish-section">
            <div class="wishes-header">
                <div class="wishes-title">💖 Наши желания</div>
                <button class="toggle-form-btn collapsed" id="toggleFormBtn">
                    ➕ Добавить желание
                </button>
            </div>

            <!-- Форма -->
            <div class="add-wish-form collapsed" id="addWishForm">
                <div class="form-title" id="formTitle">➕ Добавить новое желание</div>
                
                <div class="form-group">
                    <label>Название желания *</label>
                    <input type="text" id="wishTitle" placeholder="Например: Путешествие в Париж">
                </div>

                <div class="form-group">
                    <label>Описание (по желанию)</label>
                    <textarea id="wishDescription" placeholder="Опишите ваше желание..."></textarea>
                </div>

                <div class="image-upload">
                    <label for="imageInput">📸 Загрузить картинку</label>
                    <input type="file" id="imageInput" accept="image/*">
                    <img id="previewImage" class="preview-image" src="" alt="Предпросмотр">
                </div>

                <div class="form-buttons">
                    <button class="cancel-btn" id="cancelBtn">Отмена</button>
                    <button class="add-btn" id="submitWishBtn">💖 Добавить</button>
                </div>
            </div>

            <!-- Сетка желаний -->
            <div class="wishes-grid" id="wishesGrid"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Ваш Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyBuS1hqFtp1WEL7FjhVfG7mjUC0l7PL1-8",
            authDomain: "arina-kolya-wishes.firebaseapp.com",
            projectId: "arina-kolya-wishes",
            storageBucket: "arina-kolya-wishes.firebasestorage.app",
            messagingSenderId: "1052094026505",
            appId: "1:1052094026505:web:98e89b137955ec1eb079d8",
            measurementId: "G-87VW2TVFHD"
        };

        // Инициализация Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const wishesCollection = collection(db, "wishes");

        // Глобальные переменные
        let wishes = [];
        let pendingImage = null;
        let editingWishId = null;

        // DOM элементы
        const loadingOverlay = document.getElementById('loadingOverlay');
        const syncStatus = document.getElementById('syncStatus');
        const wishesGrid = document.getElementById('wishesGrid');
        const addWishForm = document.getElementById('addWishForm');
        const wishTitle = document.getElementById('wishTitle');
        const wishDescription = document.getElementById('wishDescription');
        const previewImage = document.getElementById('previewImage');
        const imageInput = document.getElementById('imageInput');
        const submitWishBtn = document.getElementById('submitWishBtn');
        const formTitle = document.getElementById('formTitle');
        const toggleFormBtn = document.getElementById('toggleFormBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const mainPhoto = document.getElementById('mainPhoto');

        // Функция обновления статуса синхронизации
        function setSyncStatus(message, isError = false) {
            syncStatus.textContent = message;
            syncStatus.className = 'sync-status' + (isError ? ' error' : '');
        }

        // Загрузка желаний из Firebase
        async function loadWishes() {
            try {
                loadingOverlay.classList.remove('hidden');
                setSyncStatus('🔄 Синхронизация...');
                
                const q = query(wishesCollection, orderBy('createdAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                wishes = [];
                querySnapshot.forEach((doc) => {
                    wishes.push({
                        id: doc.id,
                        firestoreId: doc.id,
                        ...doc.data()
                    });
                });
                
                // Если желаний нет, добавляем демо
                if (wishes.length === 0) {
                    await addDemoWishes();
                }
                
                displayWishes();
                setSyncStatus('🟢 Все данные синхронизированы');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                setSyncStatus('🔴 Ошибка синхронизации. Проверьте подключение.', true);
                
                // Пробуем загрузить из localStorage как запасной вариант
                const localWishes = localStorage.getItem('wishesCards');
                if (localWishes) {
                    wishes = JSON.parse(localWishes);
                    displayWishes();
                }
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        // Добавление демо-желаний
        async function addDemoWishes() {
            const demoWishes = [
                {
                    title: 'iPad Rose Gold',
                    description: 'Розовый iPad для творчества, рисования и любимых сериалов. Мечтаем вместе выбирать аксессуары!',
                    image: 'data:image/svg+xml,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
                            <rect width="300" height="200" fill="#f8bbd0" rx="20"/>
                            <rect x="40" y="20" width="220" height="150" fill="white" rx="15" stroke="#e91e63" stroke-width="3"/>
                            <circle cx="150" cy="95" r="15" fill="#e91e63"/>
                            <text x="150" y="170" text-anchor="middle" fill="#c2185b" font-size="16" font-weight="bold">iPad Rose Gold</text>
                        </svg>
                    `),
                    createdAt: Date.now()
                },
                {
                    title: 'PlayStation 5',
                    description: 'Игровая приставка для совместных вечеров. Будем играть в парные игры и веселиться!',
                    image: 'data:image/svg+xml,' + encodeURIComponent(`
                        <svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
                            <rect width="300" height="200" fill="#1a1a2e" rx="20"/>
                            <rect x="80" y="30" width="140" height="100" fill="white" rx="10" stroke="#e91e63" stroke-width="3"/>
                            <rect x="100" y="45" width="100" height="8" fill="#333" rx="4"/>
                            <text x="150" y="160" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PlayStation 5</text>
                            <text x="150" y="180" text-anchor="middle" fill="#f8bbd0" font-size="10">Digital Edition</text>
                        </svg>
                    `),
                    createdAt: Date.now() + 1
                }
            ];

            for (const demo of demoWishes) {
                await addDoc(wishesCollection, demo);
            }
        }

        // Отображение желаний
        function displayWishes() {
            if (wishes.length === 0) {
                wishesGrid.innerHTML = '<div class="empty-message">Пока нет желаний. Добавьте первое! 💕</div>';
                return;
            }

            wishesGrid.innerHTML = wishes.map(wish => `
                <div class="wish-card">
                    <img class="wish-card-image" 
                         src="${wish.image || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect width=%22300%22 height=%22200%22 fill=%22%23fce4ec%22/><text x=%22150%22 y=%22110%22 text-anchor=%22middle%22 fill=%22%23c2185b%22 font-size=%2218%22>Нет фото</text></svg>')}" 
                         alt="${wish.title || 'Желание'}"
                         onclick="editWishById('${wish.firestoreId}')"
                         title="Нажмите для редактирования">
                    <div class="wish-card-content">
                        <div class="wish-card-title">${wish.title || 'Без названия'}</div>
                        ${wish.description ? `<div class="wish-card-description">${wish.description}</div>` : ''}
                        <div class="wish-card-footer">
                            <span class="wish-card-date">${wish.date || new Date(wish.createdAt).toLocaleDateString()}</span>
                            <div class="wish-card-actions">
                                <button class="edit-card-btn" onclick="event.stopPropagation(); editWishById('${wish.firestoreId}')">✏️</button>
                                <button class="delete-card-btn" onclick="event.stopPropagation(); deleteWishById('${wish.firestoreId}')">✕</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Делаем функции глобально доступными
        window.editWishById = function(firestoreId) {
            const wish = wishes.find(w => w.firestoreId === firestoreId);
            if (!wish) return;
            
            editingWishId = firestoreId;
            wishTitle.value = wish.title || '';
            wishDescription.value = wish.description || '';
            pendingImage = wish.image || null;
            
            if (wish.image) {
                previewImage.src = wish.image;
                previewImage.classList.add('show');
            } else {
                previewImage.classList.remove('show');
            }
            
            formTitle.textContent = '✏️ Редактировать желание';
            submitWishBtn.textContent = '💾 Сохранить';
            submitWishBtn.className = 'save-btn';
            
            addWishForm.classList.remove('collapsed');
            toggleFormBtn.textContent = '🔼 Свернуть';
            toggleFormBtn.classList.add('collapsed');
            
            addWishForm.scrollIntoView({ behavior: 'smooth' });
        };

        window.deleteWishById = async function(firestoreId) {
            if (!confirm('Удалить это желание?')) return;
            
            try {
                setSyncStatus('🔄 Удаление...');
                const wishDoc = doc(db, "wishes", firestoreId);
                await deleteDoc(wishDoc);
                
                wishes = wishes.filter(w => w.firestoreId !== firestoreId);
                displayWishes();
                setSyncStatus('🟢 Желание удалено');
            } catch (error) {
                console.error('Ошибка удаления:', error);
                setSyncStatus('🔴 Ошибка при удалении', true);
            }
        };

        // Сброс формы
        function resetForm() {
            editingWishId = null;
            wishTitle.value = '';
            wishDescription.value = '';
            imageInput.value = '';
            previewImage.classList.remove('show');
            pendingImage = null;
            formTitle.textContent = '➕ Добавить новое желание';
            submitWishBtn.textContent = '💖 Добавить';
            submitWishBtn.className = 'add-btn';
        }

        // Отправка желания
        async function submitWish() {
            const title = wishTitle.value.trim();
            const description = wishDescription.value.trim();

            if (!title) {
                alert('Введите название желания');
                return;
            }

            if (!pendingImage) {
                alert('Загрузите картинку для желания');
                return;
            }

            try {
                setSyncStatus('🔄 Сохранение...');
                
                const wishData = {
                    title: title,
                    description: description,
                    image: pendingImage,
                    date: new Date().toLocaleDateString(),
                    createdAt: Date.now()
                };

                if (editingWishId) {
                    // Обновление
                    const wishDoc = doc(db, "wishes", editingWishId);
                    await updateDoc(wishDoc, wishData);
                    setSyncStatus('🟢 Желание обновлено');
                } else {
                    // Добавление
                    await addDoc(wishesCollection, wishData);
                    setSyncStatus('🟢 Желание добавлено');
                }

                resetForm();
                addWishForm.classList.add('collapsed');
                toggleFormBtn.textContent = '➕ Добавить желание';
                toggleFormBtn.classList.remove('collapsed');
                
                await loadWishes(); // Перезагружаем список
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                setSyncStatus('🔴 Ошибка при сохранении. Попробуйте снова.', true);
            }
        }

        // Обработчики событий
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Сжимаем изображение если оно большое
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // Максимальный размер 800px
                    const maxSize = 800;
                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    pendingImage = canvas.toDataURL('image/jpeg', 0.8);
                    previewImage.src = pendingImage;
                    previewImage.classList.add('show');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        submitWishBtn.addEventListener('click', submitWish);
        
        toggleFormBtn.addEventListener('click', function() {
            if (addWishForm.classList.contains('collapsed')) {
                if (!editingWishId) resetForm();
                addWishForm.classList.remove('collapsed');
                toggleFormBtn.textContent = '🔼 Свернуть';
                toggleFormBtn.classList.add('collapsed');
            } else {
                addWishForm.classList.add('collapsed');
                toggleFormBtn.textContent = '➕ Добавить желание';
                toggleFormBtn.classList.remove('collapsed');
            }
        });

        cancelBtn.addEventListener('click', function() {
            resetForm();
            addWishForm.classList.add('collapsed');
            toggleFormBtn.textContent = '➕ Добавить желание';
            toggleFormBtn.classList.remove('collapsed');
        });

        mainPhoto.addEventListener('click', function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    mainPhoto.src = event.target.result;
                    localStorage.setItem('mainPhoto', event.target.result);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        });

        // Загрузка сохраненного фото
        const savedPhoto = localStorage.getItem('mainPhoto');
        if (savedPhoto) {
            mainPhoto.src = savedPhoto;
        }

        // Запуск
        loadWishes();
    </script>
</body>
</html>
